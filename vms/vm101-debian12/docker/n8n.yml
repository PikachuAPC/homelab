version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
    - /media/hdmedia/n8n/:/home/node/.n8n/
    environment:
      - N8N_HOST=JAJAJAJJAJAJA
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - TZ=Europe/Madrid
      - GENERIC_TIMEZONE=Europe/Madrid
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=nolol
      - N8N_PROXY_HOPS=1
    restart: unless-stopped
